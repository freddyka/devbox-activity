<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Devbox Activity</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101116;
      --panel: #171a21;
      --panel-2: #1d212b;
      --border: #303644;
      --text: #eef2f8;
      --muted: #9aa4b5;
      --accent: #5dd39e;
      --accent-2: #7aa2f7;
      --empty: #242936;
      --l1: #173822;
      --l2: #245c35;
      --l3: #35a45f;
      --l4: #77e39d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { max-width: 1120px; margin: 0 auto; padding: 34px 18px 48px; }
    header { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    h1 { margin: 0; font-size: clamp(28px, 5vw, 54px); letter-spacing: 0; line-height: .95; }
    .sub { color: var(--muted); margin-top: 10px; max-width: 680px; }
    .stamp { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .cards { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; margin: 22px 0; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; min-height: 86px; }
    .label { color: var(--muted); font-size: 12px; }
    .value { font-size: 28px; font-weight: 760; margin-top: 6px; }
    section { margin-top: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    h2 { font-size: 15px; margin: 0 0 14px; }
    .calendar-wrap { overflow-x: auto; padding-bottom: 4px; }
    .calendar { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 12px); gap: 4px; width: max-content; }
    .day { width: 12px; height: 12px; border-radius: 2px; background: var(--empty); border: 1px solid rgba(255,255,255,.04); }
    .day[data-level="1"] { background: var(--l1); }
    .day[data-level="2"] { background: var(--l2); }
    .day[data-level="3"] { background: var(--l3); }
    .day[data-level="4"] { background: var(--l4); }
    .legend { display: flex; align-items: center; gap: 7px; justify-content: flex-end; color: var(--muted); font-size: 12px; margin-top: 12px; }
    .legend .day { display: inline-block; }
    .split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, .8fr); gap: 18px; }
    .rows { display: grid; gap: 8px; }
    .row { display: grid; grid-template-columns: 108px 1fr auto; gap: 10px; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); }
    .row:first-child { border-top: 0; }
    .date { color: var(--muted); font-variant-numeric: tabular-nums; }
    .project { font-weight: 650; }
    .metrics { color: var(--muted); font-variant-numeric: tabular-nums; text-align: right; }
    .bars { display: grid; gap: 8px; }
    .bar { display: grid; grid-template-columns: 140px 1fr 74px; gap: 10px; align-items: center; }
    .track { height: 8px; background: var(--panel-2); border-radius: 999px; overflow: hidden; }
    .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .empty-note { color: var(--muted); padding: 12px 0; }
    @media (max-width: 860px) {
      header { display: block; }
      .stamp { margin-top: 12px; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .split { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; gap: 2px; }
      .metrics { text-align: left; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Devbox Activity</h1>
        <div class="sub">Daily NVim activity from my Devbox setup. This page publishes counts only: projects, touched files, added/removed lines, changes and streaks.</div>
      </div>
      <div id="stamp" class="stamp">loading</div>
    </header>

    <div class="cards">
      <div class="card"><div class="label">Current streak</div><div id="currentStreak" class="value">0</div></div>
      <div class="card"><div class="label">Best streak</div><div id="bestStreak" class="value">0</div></div>
      <div class="card"><div class="label">Active days</div><div id="activeDays" class="value">0</div></div>
      <div class="card"><div class="label">Added lines</div><div id="linesAdded" class="value">0</div></div>
      <div class="card"><div class="label">Changes</div><div id="changes" class="value">0</div></div>
    </div>

    <section>
      <h2>Calendar</h2>
      <div class="calendar-wrap"><div id="calendar" class="calendar"></div></div>
      <div class="legend"><span>less</span><span class="day"></span><span class="day" data-level="1"></span><span class="day" data-level="2"></span><span class="day" data-level="3"></span><span class="day" data-level="4"></span><span>more</span></div>
    </section>

    <div class="split">
      <section>
        <h2>Recent days</h2>
        <div id="recent" class="rows"></div>
      </section>
      <section>
        <h2>Projects</h2>
        <div id="projects" class="bars"></div>
      </section>
    </div>
  </main>

  <script>
    const fmt = new Intl.NumberFormat("de-DE");
    const parseDay = (s) => new Date(s + "T12:00:00");
    const dayKey = (d) => d.toISOString().slice(0, 10);
    const activityScore = (day) => (day?.totals?.linesAdded || 0) + (day?.totals?.linesRemoved || 0) + Math.ceil((day?.totals?.changes || 0) / 8);
    const level = (score) => score <= 0 ? 0 : score < 5 ? 1 : score < 20 ? 2 : score < 60 ? 3 : 4;

    function setText(id, value) {
      document.getElementById(id).textContent = fmt.format(value || 0);
    }

    function renderCalendar(data) {
      const el = document.getElementById("calendar");
      el.innerHTML = "";
      const end = new Date();
      end.setHours(12, 0, 0, 0);
      const start = new Date(end);
      start.setDate(start.getDate() - 364);
      start.setDate(start.getDate() - start.getDay());
      for (const d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const key = dayKey(d);
        const score = activityScore(data.days[key]);
        const cell = document.createElement("div");
        cell.className = "day";
        cell.dataset.level = String(level(score));
        const totals = data.days[key]?.totals || {};
        cell.title = key + ": +" + (totals.linesAdded || 0) + " lines, " + (totals.changes || 0) + " changes";
        el.appendChild(cell);
      }
    }

    function renderRecent(data) {
      const el = document.getElementById("recent");
      const days = Object.values(data.days || {})
        .filter((d) => activityScore(d) > 0)
        .sort((a, b) => b.date.localeCompare(a.date))
        .slice(0, 30);
      if (!days.length) {
        el.innerHTML = '<div class="empty-note">No activity yet.</div>';
        return;
      }
      el.innerHTML = "";
      for (const day of days) {
        const projects = (day.projects || []).map((p) => p.name).join(", ");
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML =
          '<div class="date">' + day.date + '</div>' +
          '<div class="project">' + escapeHtml(projects || "unknown") + '</div>' +
          '<div class="metrics">+' + fmt.format(day.totals.linesAdded || 0) + ' LOC · ' + fmt.format(day.totals.filesTouched || 0) + ' files · ' + fmt.format(day.totals.changes || 0) + ' changes</div>';
        el.appendChild(row);
      }
    }

    function renderProjects(data) {
      const totals = new Map();
      for (const day of Object.values(data.days || {})) {
        for (const p of day.projects || []) {
          const current = totals.get(p.name) || { name: p.name, lines: 0, changes: 0, files: 0 };
          current.lines += p.linesAdded || 0;
          current.changes += p.changes || 0;
          current.files += p.filesTouched || 0;
          totals.set(p.name, current);
        }
      }
      const rows = [...totals.values()].sort((a, b) => b.lines - a.lines || b.changes - a.changes).slice(0, 12);
      const max = Math.max(1, ...rows.map((r) => r.lines + Math.ceil(r.changes / 8)));
      const el = document.getElementById("projects");
      if (!rows.length) {
        el.innerHTML = '<div class="empty-note">No projects yet.</div>';
        return;
      }
      el.innerHTML = "";
      for (const row of rows) {
        const score = row.lines + Math.ceil(row.changes / 8);
        const item = document.createElement("div");
        item.className = "bar";
        item.innerHTML =
          '<div class="project">' + escapeHtml(row.name) + '</div>' +
          '<div class="track"><div class="fill" style="width:' + Math.max(3, Math.round(score / max * 100)) + '%"></div></div>' +
          '<div class="metrics">+' + fmt.format(row.lines) + '</div>';
        el.appendChild(item);
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
    }

    function loadActivity() {
      fetch("https://api.github.com/repos/freddyka/devbox-activity/contents/data/activity.json?ref=main&v=" + Date.now(), {
        cache: "no-store",
        headers: { Accept: "application/vnd.github.raw+json" },
      })
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("stamp").textContent = data.generatedAt
            ? "updated " + new Date(data.generatedAt).toLocaleString("de-DE")
            : "waiting for first NVim save";
          setText("currentStreak", data.streak.current);
          setText("bestStreak", data.streak.best);
          setText("activeDays", data.totals.activeDays);
          setText("linesAdded", data.totals.linesAdded);
          setText("changes", data.totals.changes);
          renderCalendar(data);
          renderRecent(data);
          renderProjects(data);
        })
        .catch(() => {
          document.getElementById("stamp").textContent = "activity data missing";
        });
    }

    loadActivity();
    setInterval(loadActivity, 60000);
  </script>
</body>
</html>
